name: Build SkyTrace

on:
  workflow_dispatch:
    inputs:
      version:
        description: "版本标签 (如 v0.1.0)"
        required: false
        default: ""
      build_snapshot:
        description: "同时编译 snapshot-only 版本"
        type: boolean
        default: true

env:
  CARGO_INCREMENTAL: 0

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            label: macOS-arm64
          - platform: macos-latest
            target: x86_64-apple-darwin
            label: macOS-x64
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            label: Windows-x64

    runs-on: ${{ matrix.platform }}
    name: ${{ matrix.label }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: sky-trace/src-tauri

      - name: Install dependencies
        working-directory: sky-trace
        run: npm ci

      # macOS/Windows 不需要额外系统依赖（Tauri 使用原生 WebView）

      - name: Build full version
        working-directory: sky-trace
        run: npx tauri build --target ${{ matrix.target }}

      - name: Stash full version artifacts
        shell: bash
        run: |
          mkdir -p artifacts-full
          BUNDLE="sky-trace/src-tauri/target/${{ matrix.target }}/release/bundle"
          cp -r "$BUNDLE/macos" artifacts-full/ 2>/dev/null || true
          cp -r "$BUNDLE/dmg" artifacts-full/ 2>/dev/null || true
          cp -r "$BUNDLE/nsis" artifacts-full/ 2>/dev/null || true

      - name: Upload full version
        uses: actions/upload-artifact@v4
        with:
          name: SkyTrace-full-${{ matrix.label }}
          path: artifacts-full
          if-no-files-found: ignore

      - name: Build snapshot-only version
        if: inputs.build_snapshot
        working-directory: sky-trace
        run: npx tauri build --target ${{ matrix.target }} -- --features snapshot-only

      - name: Upload snapshot-only version
        if: inputs.build_snapshot
        uses: actions/upload-artifact@v4
        with:
          name: SkyTrace-snapshot-${{ matrix.label }}
          path: |
            sky-trace/src-tauri/target/${{ matrix.target }}/release/bundle/macos/*.app
            sky-trace/src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
            sky-trace/src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.exe
          if-no-files-found: ignore

  release:
    needs: build
    if: inputs.version != ''
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.version }}
          name: SkyTrace ${{ inputs.version }}
          draft: true
          files: artifacts/**/*
